services:
  - type: web
    name: japan-tea-ise-cha
    env: node
    region: singapore   # 日本から最も近いリージョン
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_LOCATION_ID
        sync: false
      - key: SQUARE_APP_ID
        sync: false
      - key: SQUARE_ENV
        value: sandbox
      - key: NODE_ENV
        value: production
