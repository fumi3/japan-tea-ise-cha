services:
  - type: web
    name: ISE-CHA
    runtime: node
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SQUARE_ACCESS_TOKEN
        sync: false
      - key: SQUARE_LOCATION_ID
        sync: false
      - key: SQUARE_APP_ID
        sync: false
      - key: SQUARE_ENV
        value: sandbox
      - key: NODE_ENV
        value: production
